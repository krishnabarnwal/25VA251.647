<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
      //arry

     let arr = [1, 2, 3];

// Add element at index 1
arr.splice(1, 0, 10);  
console.log(arr); // [1, 10, 2, 3]

// Remove element
arr.splice(2, 1);  
console.log(arr); // [1, 10, 3]

// Replace element
arr.splice(1, 1, 99);
console.log(arr); // [1, 99, 3]

//pop
arr.pop();

console.log(arr); // [1, 2]

    </script>
</body>
</html>
