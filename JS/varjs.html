<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //JS variable data value types

        //preimitive : immutable single value and staores in memory.

        //string===
        var myName="Krishna";
        console.log("my name is " + myName);

        //number
        var myMob=82928592850;
        console.log("my Mobile no is " + myMob);
        console.log(typeof(myMob));

        //Boolean
        var isMarried=true;
        console.log(myName + " is married? " + isMarried);
        console.log(typeof(isMarried));

        //Undefined
        var myAdd;
        console.log(myName + " address is " + myAdd);
        console.log(typeof(myAdd));

        //null
        var myEmail=null;
        console.log(myName + " e-mail address is " + myEmail);
        console.log(typeof(myEmail));

        //bigint 
        var myValue=79823592592593799277493242579834759347527;
        console.log(myValue);
        console.log(typeof(myValue));

        //Symbol
        var val1="Hello";
        var val2="Hello";
        console.log(val1==val2);
        console.log(typeof(val1) + " and " + typeof(val2));


        var val3=Symbol("Hello");
        var val4=Symbol("Hello");
        console.log(val3==val4);

        //Reference or Non-Primitive Data Value Types
        //object - values are defined in paired of key-vlaue
        let myInfo={
            name:"Krishna", 
            age:23, 
            mob:592818985, 
            eMail:"krishna@gamil.com",
            isMarried:false,
            address:null,
            branch:"CSE",
            section:18,
        }
        console.log(myInfo);
        console.log(Object.keys(myInfo));
        console.log(Object.keys(myInfo).length);
        console.log(myInfo.branch);

        //array-collection of any data types in JS
        let studentDetails=["Krish", 24, false,"krish12@gmail.com" , "GZB"];
        console.log(studentDetails);
        console.log(studentDetails.length);
        
        for(i=0; i<studentDetails.length; i++){
            console.log(studentDetails[i]);
        }

        ///function - block of code i.e. perform particuler any task
        function myCalc(){
            let num1=5;
            let num2=10;
            let result=num1+num2;
            console.log("Addition of two number is " + (num1 +num2));//In bracket
            console.log(result);
        }
        myCalc();
    </script>
</body>
</html>
